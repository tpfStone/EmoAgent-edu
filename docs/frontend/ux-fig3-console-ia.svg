<svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" font-family="'Nunito','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      .t{fill:#23201b;} .soft{fill:#5c564b;} .faint{fill:#8a8276;}
      .mono{font-family:'IBM Plex Mono',monospace;}
    </style>
  </defs>
  <rect width="920" height="560" fill="#f4f0e8"/>
  <text x="40" y="46" class="t" font-size="22" font-weight="600" font-family="Georgia,serif">图 3 · 研究分析台 · 信息架构</text>
  <text x="40" y="70" class="soft" font-size="13.5">同一工具，对评委讲清系统、对开发者监控状态；三视图各自服务两类人</text>

  <!-- nav -->
  <rect x="40" y="100" width="160" height="410" rx="10" fill="#ece6d8" stroke="#d8cfbd" stroke-width="1.2"/>
  <text x="60" y="130" class="t" font-size="16" font-weight="600" font-family="Georgia,serif">EmoAgent</text>
  <text x="60" y="148" class="mono faint" font-size="10">研究分析台</text>
  <rect x="52" y="170" width="136" height="44" rx="6" fill="#23201b"/>
  <text x="66" y="190" fill="#f4f0e8" font-size="13" font-weight="600">单轮追踪</text>
  <text x="66" y="206" fill="#bdb3a0" font-size="9.5" class="mono">pipeline trace</text>
  <rect x="52" y="222" width="136" height="44" rx="6" fill="transparent"/>
  <text x="66" y="242" class="t" font-size="13" font-weight="600">批量总览</text>
  <text x="66" y="258" class="faint" font-size="9.5" class="mono">45-sample run</text>
  <rect x="52" y="274" width="136" height="44" rx="6" fill="transparent"/>
  <text x="66" y="294" class="t" font-size="13" font-weight="600">框架对标</text>
  <text x="66" y="310" class="faint" font-size="9.5" class="mono">CASEL·EPITOME·CSSRS</text>
  <text x="60" y="495" class="mono faint" font-size="9.5">离线 · 学生端不可见</text>

  <!-- view 1 -->
  <rect x="230" y="100" width="650" height="120" rx="10" fill="#fff" stroke="#d8cfbd" stroke-width="1.2"/>
  <text x="250" y="126" class="t" font-size="15" font-weight="600" font-family="Georgia,serif">① 单轮追踪</text>
  <text x="250" y="146" class="soft" font-size="11.5">输入 → F1 分级 → F2 情境+激活CASEL → F3 双候选 → F4 EPITOME打分·择优 → 输出</text>
  <g font-size="10.5" class="mono">
    <rect x="250" y="160" width="64" height="40" rx="5" fill="#e3eee2" stroke="#3f7d54"/><text x="282" y="184" text-anchor="middle" fill="#3f7d54">F1</text>
    <rect x="322" y="160" width="64" height="40" rx="5" fill="#f4f0e8" stroke="#d8cfbd"/><text x="354" y="184" text-anchor="middle" class="soft">F2</text>
    <rect x="394" y="160" width="64" height="40" rx="5" fill="#f4f0e8" stroke="#d8cfbd"/><text x="426" y="184" text-anchor="middle" class="soft">F3</text>
    <rect x="466" y="160" width="120" height="40" rx="5" fill="#f4f0e8" stroke="#d8cfbd"/><text x="526" y="184" text-anchor="middle" class="soft">F4 择优·argmax</text>
  </g>
  <text x="610" y="186" class="faint" font-size="10.5">boundary_flag 候选出局 · preference_pair → DPO</text>

  <!-- view 2 -->
  <rect x="230" y="232" width="650" height="120" rx="10" fill="#fff" stroke="#d8cfbd" stroke-width="1.2"/>
  <text x="250" y="258" class="t" font-size="15" font-weight="600" font-family="Georgia,serif">② 批量总览</text>
  <text x="250" y="278" class="soft" font-size="11.5">45 条验收 run 的聚合：对评委是方法可靠性证据，对开发者是回归基线</text>
  <g>
    <rect x="250" y="292" width="120" height="48" rx="6" fill="#f4f0e8"/><text x="310" y="316" text-anchor="middle" class="t" font-size="18" font-weight="600" font-family="Georgia,serif">95.6%</text><text x="310" y="332" text-anchor="middle" class="faint" font-size="9.5">情境准确率</text>
    <rect x="378" y="292" width="120" height="48" rx="6" fill="#f4f0e8"/><text x="438" y="316" text-anchor="middle" class="t" font-size="18" font-weight="600" font-family="Georgia,serif">45/45</text><text x="438" y="332" text-anchor="middle" class="faint" font-size="9.5">链路成功</text>
    <rect x="506" y="292" width="120" height="48" rx="6" fill="#f4f0e8"/><text x="566" y="316" text-anchor="middle" class="t" font-size="18" font-weight="600" font-family="Georgia,serif">43</text><text x="566" y="332" text-anchor="middle" class="faint" font-size="9.5">偏好对→DPO</text>
    <rect x="634" y="292" width="120" height="48" rx="6" fill="#f1ddd6"/><text x="694" y="316" text-anchor="middle" fill="#a33b32" font-size="18" font-weight="600" font-family="Georgia,serif">1</text><text x="694" y="332" text-anchor="middle" class="faint" font-size="9.5">边界拦截</text>
  </g>

  <!-- view 3 -->
  <rect x="230" y="364" width="650" height="146" rx="10" fill="#fff" stroke="#d8cfbd" stroke-width="1.2"/>
  <text x="250" y="390" class="t" font-size="15" font-weight="600" font-family="Georgia,serif">③ 框架对标</text>
  <text x="250" y="410" class="soft" font-size="11.5">每个维度都挂靠权威框架：可引用、可验证、诚实标注 limitation</text>
  <g font-size="11">
    <rect x="250" y="424" width="195" height="70" rx="7" fill="#f4f0e8" stroke="#3f7d54" stroke-width="1.2"/>
    <text x="262" y="444" fill="#3f7d54" class="mono" font-size="11" font-weight="600">C-SSRS</text>
    <text x="262" y="463" class="soft">安全门三级分流</text>
    <text x="262" y="481" class="faint" font-size="10">green / yellow / red</text>

    <rect x="455" y="424" width="195" height="70" rx="7" fill="#f4f0e8" stroke="#3a6b8a" stroke-width="1.2"/>
    <text x="467" y="444" fill="#3a6b8a" class="mono" font-size="11" font-weight="600">EPITOME</text>
    <text x="467" y="463" class="soft">共情 ER / IP / EX</text>
    <text x="467" y="481" class="faint" font-size="10">情感 vs 认知共情 · IP 可靠性注明</text>

    <rect x="660" y="424" width="195" height="70" rx="7" fill="#f4f0e8" stroke="#7a6a3f" stroke-width="1.2"/>
    <text x="672" y="444" fill="#7a6a3f" class="mono" font-size="11" font-weight="600">CASEL</text>
    <text x="672" y="463" class="soft">五维 · 情境动态激活</text>
    <text x="672" y="481" class="faint" font-size="10">对标 Q-matrix lookup</text>
  </g>
</svg>
