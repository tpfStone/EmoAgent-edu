<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif">
  <style>
    .title{font-size:22px;font-weight:700;fill:#111827}
    .h{font-size:16px;font-weight:700;fill:#111827}
    .s{font-size:13px;fill:#374151}
    .note{font-size:12px;fill:#4b5563}
    .setup{fill:#ecfdf5;stroke:#10b981}
    .runtime{fill:#eff6ff;stroke:#3b82f6}
    .offline{fill:#fff7ed;stroke:#f97316}
    .gate{fill:#fef2f2;stroke:#ef4444}
    .done{fill:#f0fdf4;stroke:#22c55e}
    .box{fill:#ffffff;stroke:#d1d5db}
    .arr{stroke:#6b7280;stroke-width:1.7;fill:none}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="40" y="42">EmoEdu MAS 三阶段生命周期</text>
  <text class="note" x="40" y="66">当前状态：运行时已跑通 F1-F4；pairwise 是 F4 目标主线，但仍处于离线 gate。</text>

  <rect class="setup" x="48" y="104" width="250" height="150" rx="14" stroke-width="1.5"/>
  <text class="h" x="173" y="134" text-anchor="middle">阶段一：准备与冷启动</text>
  <text class="s" x="72" y="166">• CASEL / EPITOME / IRI 定义标准</text>
  <text class="s" x="72" y="192">• 45 条根语料与 probe-001 已完成</text>
  <text class="s" x="72" y="218">• RAG 记忆库仍是后续增强项</text>

  <rect class="runtime" x="356" y="104" width="250" height="150" rx="14" stroke-width="1.5"/>
  <text class="h" x="481" y="134" text-anchor="middle">阶段二：当前对话运行时</text>
  <text class="s" x="380" y="166">• F1 安全门 -> F2 情境分析</text>
  <text class="s" x="380" y="192">• F3 生成 c1 / c2 两条候选</text>
  <text class="s" x="380" y="218">• F4 仍用 pointwise 择优</text>

  <rect class="offline" x="664" y="104" width="250" height="150" rx="14" stroke-width="1.5"/>
  <text class="h" x="789" y="134" text-anchor="middle">阶段三：离线验证与进化</text>
  <text class="s" x="688" y="166">• pairwise 人工 A/B gate</text>
  <text class="s" x="688" y="192">• 稳定偏好对才进入 DPO</text>
  <text class="s" x="688" y="218">• DPO 后再回流生成器</text>

  <line class="arr" x1="298" y1="179" x2="352" y2="179" marker-end="url(#arrow)"/>
  <line class="arr" x1="606" y1="179" x2="660" y2="179" marker-end="url(#arrow)"/>

  <rect class="gate" x="356" y="308" width="250" height="118" rx="14" stroke-width="1.5"/>
  <text class="h" x="481" y="338" text-anchor="middle">当前阻塞：Pairwise Gate</text>
  <text class="s" x="380" y="370">• Phase A rerun: inconclusive</text>
  <text class="s" x="380" y="394">• c1 偏斜与有效交集不足</text>
  <text class="s" x="380" y="418">• 未解锁 runtime / DPO</text>

  <path class="arr" d="M789 254 L789 367 L610 367" marker-end="url(#arrow)"/>

  <rect class="done" x="664" y="312" width="250" height="96" rx="14" stroke-width="1.5"/>
  <text class="h" x="789" y="342" text-anchor="middle">通过后</text>
  <text class="s" x="688" y="374">• production 放量</text>
  <text class="s" x="688" y="398">• DPO + 消融实验</text>

  <path class="arr" d="M606 367 L660 367" marker-end="url(#arrow)"/>
  <path class="arr" d="M789 408 L789 472 L481 472 L481 430" marker-end="url(#arrow)"/>

  <rect class="box" x="48" y="456" width="250" height="48" rx="12" stroke-width="1"/>
  <text class="note" x="173" y="485" text-anchor="middle">旧 pointwise 偏好对只作诊断</text>
  <line class="arr" x1="298" y1="480" x2="436" y2="480" marker-end="url(#arrow)"/>
</svg>
