<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<style>
.th{font-size:13px;font-weight:600;fill:#1f2937}
.ts{font-size:11px;fill:#4b5563}
.teal{fill:#ecfdf5;stroke:#5eead4}
.purple{fill:#f5f3ff;stroke:#c4b5fd}
.coral{fill:#fff1f2;stroke:#fda4af}
.green{fill:#f0fdf4;stroke:#86efac}
.box{fill:#f9fafb;stroke:#d1d5db}
.arr{stroke:#9ca3af;stroke-width:1.5;fill:none}
</style>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text class="th" x="20" y="28" font-size="15">情感教育多智能体系统 · 三阶段生命周期</text>

<rect class="teal" x="40" y="60" width="180" height="110" rx="12" stroke-width="1"/>
<text class="th" x="130" y="84" text-anchor="middle">阶段一：setup</text>
<text class="ts" x="130" y="108" text-anchor="middle">专家定情感维度+量表</text>
<text class="ts" x="130" y="128" text-anchor="middle">冷启动：构建对话语料</text>
<text class="ts" x="130" y="148" text-anchor="middle">RAG 记忆库为规划项</text>

<rect class="purple" x="250" y="60" width="180" height="110" rx="12" stroke-width="1"/>
<text class="th" x="340" y="84" text-anchor="middle">阶段二：生成+把关</text>
<text class="ts" x="340" y="108" text-anchor="middle">多 agent 生成候选回应</text>
<text class="ts" x="340" y="128" text-anchor="middle">critic 成对比较择优</text>
<text class="ts" x="340" y="148" text-anchor="middle">安全门前置否决</text>

<rect class="coral" x="460" y="60" width="180" height="110" rx="12" stroke-width="1"/>
<text class="th" x="550" y="84" text-anchor="middle">阶段三：离线优化</text>
<text class="ts" x="550" y="108" text-anchor="middle">F9/pairwise gate</text>
<text class="ts" x="550" y="128" text-anchor="middle">稳定偏好对 → DPO</text>
<text class="ts" x="550" y="148" text-anchor="middle">异步，攒够才训</text>

<line x1="220" y1="115" x2="248" y2="115" class="arr" marker-end="url(#a)"/>
<line x1="430" y1="115" x2="458" y2="115" class="arr" marker-end="url(#a)"/>

<text class="ts" x="130" y="188" text-anchor="middle">一次性</text>
<text class="ts" x="340" y="188" text-anchor="middle">每次对话</text>
<text class="ts" x="550" y="188" text-anchor="middle">周期性</text>

<rect class="box" x="180" y="220" width="320" height="44" rx="8" stroke-width="1"/>
<text class="th" x="340" y="242" text-anchor="middle">更新后的 teacher agent 回流到阶段二</text>
<line x1="550" y1="170" x2="550" y2="242" class="arr"/>
<line x1="550" y1="242" x2="502" y2="242" class="arr" marker-end="url(#a)"/>
<line x1="180" y1="242" x2="130" y2="242" class="arr"/>
<line x1="130" y1="242" x2="130" y2="172" class="arr" marker-end="url(#a)"/>

<rect class="green" x="120" y="300" width="440" height="44" rx="8" stroke-width="1"/>
<text class="ts" x="340" y="322" text-anchor="middle">关键改造：judge 从「打分终点」变成「成对偏好把关」</text>
</svg>
