<svg xmlns="http://www.w3.org/2000/svg" width="700" height="780" viewBox="0 0 700 780" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<style>
.th{font-size:13px;font-weight:600;fill:#1f2937}
.ts{font-size:11px;fill:#4b5563}
.teal{fill:#ecfdf5;stroke:#5eead4}
.purple{fill:#f5f3ff;stroke:#c4b5fd}
.coral{fill:#fff1f2;stroke:#fda4af}
.green{fill:#f0fdf4;stroke:#86efac}
.blue{fill:#eff6ff;stroke:#93c5fd}
.red{fill:#fef2f2;stroke:#fca5a5}
.amber{fill:#fffbeb;stroke:#fcd34d}
.box{fill:#f9fafb;stroke:#d1d5db}
.arr{stroke:#9ca3af;stroke-width:1.5;fill:none}
</style>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text class="th" x="20" y="26" font-size="15">运行时 generator–critic 管线详图</text>

<rect class="box" x="210" y="40" width="280" height="44" rx="8" stroke-width="1"/>
<text class="th" x="350" y="62" text-anchor="middle">输入：用户消息 + 对话历史</text>
<line x1="350" y1="84" x2="350" y2="110" class="arr" marker-end="url(#a)"/>

<rect class="red" x="180" y="110" width="340" height="60" rx="8" stroke-width="1"/>
<text class="th" x="350" y="132" text-anchor="middle">① 安全门 — C-SSRS 分级器</text>
<text class="ts" x="350" y="152" text-anchor="middle">输出：风险级 {绿/黄/红}</text>
<text class="ts" x="600" y="132" text-anchor="middle">黄/红</text>
<text class="ts" x="600" y="150" text-anchor="middle">→转介出口</text>
<path d="M520 140 L575 140" class="arr" marker-end="url(#a)"/>
<text class="ts" x="375" y="186">绿：继续</text>
<line x1="350" y1="170" x2="350" y2="200" class="arr" marker-end="url(#a)"/>

<rect class="teal" x="180" y="200" width="340" height="60" rx="8" stroke-width="1"/>
<text class="th" x="350" y="222" text-anchor="middle">② 情境分析（对标 Q-matrix lookup）</text>
<text class="ts" x="350" y="242" text-anchor="middle">输出：情境类型 + 激活的CASEL维度子集</text>
<line x1="350" y1="260" x2="350" y2="286" class="arr" marker-end="url(#a)"/>

<rect class="blue" x="180" y="286" width="340" height="60" rx="8" stroke-width="1"/>
<text class="th" x="350" y="308" text-anchor="middle">③ RAG 检索</text>
<text class="ts" x="350" y="328" text-anchor="middle">输出：相似情境的优质回应示例</text>
<line x1="350" y1="346" x2="350" y2="372" class="arr" marker-end="url(#a)"/>

<rect class="box" x="210" y="372" width="280" height="44" rx="8" stroke-width="1"/>
<text class="th" x="350" y="394" text-anchor="middle">④ dispatch 多取向生成器</text>

<rect class="purple" x="60" y="450" width="180" height="60" rx="8" stroke-width="1"/>
<text class="th" x="150" y="472" text-anchor="middle">生成器 A · 共情</text>
<text class="ts" x="150" y="492" text-anchor="middle">候选回应 1</text>
<rect class="purple" x="260" y="450" width="180" height="60" rx="8" stroke-width="1"/>
<text class="th" x="350" y="472" text-anchor="middle">生成器 B · 引导反思</text>
<text class="ts" x="350" y="492" text-anchor="middle">候选回应 2</text>
<rect class="purple" x="460" y="450" width="180" height="60" rx="8" stroke-width="1"/>
<text class="th" x="550" y="472" text-anchor="middle">生成器 C · 行动（后加）</text>
<text class="ts" x="550" y="492" text-anchor="middle">候选回应 3</text>
<path d="M350 416 L150 416 L150 448" class="arr" marker-end="url(#a)"/>
<line x1="350" y1="416" x2="350" y2="448" class="arr" marker-end="url(#a)"/>
<path d="M350 416 L550 416 L550 448" class="arr" marker-end="url(#a)"/>
<path d="M150 510 L150 536 L350 536" class="arr"/>
<line x1="350" y1="510" x2="350" y2="536" class="arr"/>
<path d="M550 510 L550 536 L350 536" class="arr"/>
<line x1="350" y1="536" x2="350" y2="562" class="arr" marker-end="url(#a)"/>

<rect class="coral" x="120" y="562" width="460" height="130" rx="12" stroke-width="1"/>
<text class="th" x="350" y="584" text-anchor="middle">⑤ Critic — 多维评分 + 择优</text>
<rect class="amber" x="140" y="602" width="200" height="34" rx="6" stroke-width="1"/>
<text class="ts" x="240" y="623" text-anchor="middle">逐候选打分：EPITOME + 激活CASEL维</text>
<rect class="amber" x="360" y="602" width="200" height="34" rx="6" stroke-width="1"/>
<text class="ts" x="460" y="623" text-anchor="middle">越界/不适龄/幻觉检测</text>
<rect class="amber" x="140" y="644" width="420" height="34" rx="6" stroke-width="1"/>
<text class="ts" x="350" y="665" text-anchor="middle">加权总分 → argmax 择优（选最佳，不取多数派）</text>
<line x1="350" y1="692" x2="350" y2="718" class="arr" marker-end="url(#a)"/>

<rect class="green" x="180" y="718" width="340" height="56" rx="8" stroke-width="1"/>
<text class="th" x="350" y="740" text-anchor="middle">⑥ 回复用户</text>
<text class="ts" x="350" y="760" text-anchor="middle">最佳回应 + (情境,候选,分数) 入日志供 DPO</text>
</svg>
