<svg xmlns="http://www.w3.org/2000/svg" width="980" height="860" viewBox="0 0 980 860" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif">
  <style>
    .title{font-size:22px;font-weight:700;fill:#111827}
    .h{font-size:16px;font-weight:700;fill:#111827}
    .s{font-size:13px;fill:#374151}
    .note{font-size:12px;fill:#4b5563}
    .box{fill:#ffffff;stroke:#d1d5db}
    .red{fill:#fef2f2;stroke:#ef4444}
    .green{fill:#ecfdf5;stroke:#10b981}
    .blue{fill:#eff6ff;stroke:#3b82f6}
    .purple{fill:#f5f3ff;stroke:#8b5cf6}
    .amber{fill:#fffbeb;stroke:#f59e0b}
    .gray{fill:#f9fafb;stroke:#9ca3af}
    .arr{stroke:#6b7280;stroke-width:1.7;fill:none}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="42" y="42">当前 /chat 运行时与目标 pairwise 迁移点</text>
  <text class="note" x="42" y="66">图中实线为当前运行时；虚线区域为离线试点或后续迁移。</text>

  <rect class="box" x="330" y="96" width="320" height="58" rx="12" stroke-width="1.2"/>
  <text class="h" x="490" y="122" text-anchor="middle">输入</text>
  <text class="s" x="490" y="144" text-anchor="middle">用户消息 + 会话历史窗口</text>

  <line class="arr" x1="490" y1="154" x2="490" y2="190" marker-end="url(#arrow)"/>

  <rect class="red" x="300" y="190" width="380" height="84" rx="12" stroke-width="1.4"/>
  <text class="h" x="490" y="218" text-anchor="middle">F1 安全门</text>
  <text class="s" x="326" y="244">green 进入 F2；yellow / red 直接返回转介话术</text>
  <text class="s" x="326" y="264">异常或解析失败按 yellow 保守处理</text>

  <path class="arr" d="M680 232 L790 232 L790 310" marker-end="url(#arrow)"/>
  <rect class="red" x="720" y="310" width="210" height="66" rx="12" stroke-width="1.2"/>
  <text class="h" x="825" y="337" text-anchor="middle">转介出口</text>
  <text class="s" x="825" y="359" text-anchor="middle">不进入生成链路</text>

  <line class="arr" x1="490" y1="274" x2="490" y2="314" marker-end="url(#arrow)"/>

  <rect class="green" x="300" y="314" width="380" height="76" rx="12" stroke-width="1.4"/>
  <text class="h" x="490" y="342" text-anchor="middle">F2 情境分析</text>
  <text class="s" x="326" y="368">输出 scenario 与 activated_casel</text>

  <line class="arr" x1="490" y1="390" x2="490" y2="428" marker-end="url(#arrow)"/>

  <rect class="gray" x="300" y="428" width="380" height="62" rx="12" stroke-width="1.2"/>
  <text class="h" x="490" y="454" text-anchor="middle">F6 RAG 检索</text>
  <text class="s" x="490" y="476" text-anchor="middle">当前 /chat 传空数组；后续增强项</text>

  <line class="arr" x1="490" y1="490" x2="490" y2="528" marker-end="url(#arrow)"/>

  <rect class="blue" x="300" y="528" width="380" height="58" rx="12" stroke-width="1.4"/>
  <text class="h" x="490" y="555" text-anchor="middle">F3 双取向生成</text>
  <text class="s" x="490" y="576" text-anchor="middle">并发生成 c1 与 c2</text>

  <path class="arr" d="M490 586 L270 628" marker-end="url(#arrow)"/>
  <path class="arr" d="M490 586 L710 628" marker-end="url(#arrow)"/>

  <rect class="blue" x="90" y="628" width="300" height="76" rx="12" stroke-width="1.2"/>
  <text class="h" x="240" y="656" text-anchor="middle">c1 情感共情型</text>
  <text class="s" x="240" y="680" text-anchor="middle">具体承接，先接住情绪</text>

  <rect class="blue" x="590" y="628" width="300" height="76" rx="12" stroke-width="1.2"/>
  <text class="h" x="740" y="656" text-anchor="middle">c2 认知共情型</text>
  <text class="s" x="740" y="680" text-anchor="middle">看懂处境与担忧</text>

  <path class="arr" d="M240 704 L240 736 L490 736" marker-end="url(#arrow)"/>
  <path class="arr" d="M740 704 L740 736 L492 736" marker-end="url(#arrow)"/>

  <rect class="amber" x="300" y="736" width="380" height="86" rx="12" stroke-width="1.4"/>
  <text class="h" x="490" y="764" text-anchor="middle">F4 当前默认：pointwise critic</text>
  <text class="s" x="326" y="790">EPITOME / CASEL / boundary -> weighted_total</text>
  <text class="s" x="326" y="812">旧 preference_pair 只作兼容与诊断</text>

  <rect class="purple" x="42" y="742" width="218" height="72" rx="12" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text class="h" x="151" y="770" text-anchor="middle">离线目标</text>
  <text class="s" x="151" y="794" text-anchor="middle">pairwise A/B gate</text>
  <path class="arr" d="M300 780 L264 780" marker-end="url(#arrow)" stroke-dasharray="6 5"/>

  <line class="arr" x1="490" y1="822" x2="490" y2="844" marker-end="url(#arrow)"/>
  <text class="h" x="490" y="856" text-anchor="middle">回复用户并写入 trace</text>
</svg>
