<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<style>
.title{font-size:16px;font-weight:700;fill:#111827}
.h{font-size:13px;font-weight:700;fill:#111827}
.t{font-size:11px;fill:#4b5563}
.small{font-size:10px;fill:#6b7280}
.theory{fill:#eff6ff;stroke:#93c5fd;stroke-width:1}
.runtime{fill:#f0fdf4;stroke:#86efac;stroke-width:1.2}
.diag{fill:#fff7ed;stroke:#fdba74;stroke-width:1}
.gate{fill:#f5f3ff;stroke:#c4b5fd;stroke-width:1}
.future{fill:#fef2f2;stroke:#fca5a5;stroke-width:1}
.arr{stroke:#9ca3af;stroke-width:1.6;fill:none}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="title" x="24" y="30">Evidence chain: frameworks -> runtime diagnostics -> offline gates</text>

<rect class="theory" x="42" y="64" width="206" height="82" rx="8"/>
<text class="h" x="145" y="89" text-anchor="middle">Educational frameworks</text>
<text class="t" x="64" y="113">CASEL: educational dimensions</text>
<text class="t" x="64" y="132">EPITOME: ER / IP / EX language</text>

<rect class="runtime" x="278" y="64" width="206" height="82" rx="8"/>
<text class="h" x="381" y="89" text-anchor="middle">Runtime generation</text>
<text class="t" x="300" y="113">F2 routes support mode</text>
<text class="t" x="300" y="132">F3 streams one candidate</text>

<rect class="diag" x="514" y="64" width="206" height="82" rx="8"/>
<text class="h" x="617" y="89" text-anchor="middle">Background diagnostics</text>
<text class="t" x="536" y="113">F4 pointwise quality labels</text>
<text class="t" x="536" y="132">session guidance for later turns</text>

<line class="arr" x1="248" y1="105" x2="276" y2="105" marker-end="url(#arrow)"/>
<line class="arr" x1="484" y1="105" x2="512" y2="105" marker-end="url(#arrow)"/>

<rect class="gate" x="88" y="226" width="270" height="86" rx="8"/>
<text class="h" x="223" y="252" text-anchor="middle">Offline pairwise / F9 gate</text>
<text class="t" x="110" y="276">Phase A rerun is inconclusive</text>
<text class="small" x="110" y="294">requires cleaner package, controls, human A/B</text>

<rect class="future" x="402" y="226" width="270" height="86" rx="8"/>
<text class="h" x="537" y="252" text-anchor="middle">Future optimization</text>
<text class="t" x="424" y="276">only stable validated preferences</text>
<text class="small" x="424" y="294">can become DPO training data</text>

<path class="arr" d="M617 146 C617 186 537 186 537 224" marker-end="url(#arrow)"/>
<line class="arr" x1="358" y1="269" x2="400" y2="269" marker-end="url(#arrow)"/>

<rect class="runtime" x="170" y="370" width="420" height="62" rx="8"/>
<text class="h" x="380" y="396" text-anchor="middle">Current public claim</text>
<text class="t" x="380" y="418" text-anchor="middle">runtime stays fast; offline evidence improves prompts, reports, and future gates</text>

<path class="arr" d="M537 312 C537 350 380 350 380 368" marker-end="url(#arrow)"/>
<path class="arr" d="M223 312 C223 350 380 350 380 368" marker-end="url(#arrow)"/>
</svg>
