<svg xmlns="http://www.w3.org/2000/svg" width="700" height="470" viewBox="0 0 700 470" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<style>
.th{font-size:13px;font-weight:600;fill:#1f2937}
.ts{font-size:11px;fill:#4b5563}
.teal{fill:#ecfdf5;stroke:#5eead4}
.purple{fill:#f5f3ff;stroke:#c4b5fd}
.coral{fill:#fff1f2;stroke:#fda4af}
.green{fill:#f0fdf4;stroke:#86efac}
.blue{fill:#eff6ff;stroke:#93c5fd}
.amber{fill:#fffbeb;stroke:#fcd34d}
.arr{stroke:#9ca3af;stroke-width:1.5;fill:none}
</style>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text class="th" x="20" y="26" font-size="15">三层权威框架 → DPO 的论证闭环</text>

<rect class="teal" x="40" y="44" width="620" height="54" rx="10" stroke-width="1"/>
<text class="th" x="60" y="66">第一层 · CASEL 五大能力（顶层维度 / 教育价值兜底）</text>
<text class="ts" x="60" y="86">自我觉察 / 自我管理 / 社会觉察 / 关系技能 / 负责任决策 — 权威，有中文版量表 SEL RF-P</text>
<line x1="350" y1="98" x2="350" y2="120" class="arr" marker-end="url(#a)"/>

<rect class="purple" x="40" y="120" width="620" height="54" rx="10" stroke-width="1"/>
<text class="th" x="60" y="142">第二层 · EPITOME（打分主力，给单条回应打 0/1/2）</text>
<text class="ts" x="60" y="162">情绪反应 ER / 解释 IP / 探索 EX — 为对话共情设计；ER·IP 已补操作定义缓解可靠性局限</text>
<line x1="350" y1="174" x2="350" y2="196" class="arr" marker-end="url(#a)"/>

<rect class="blue" x="40" y="196" width="620" height="54" rx="10" stroke-width="1"/>
<text class="th" x="60" y="218">第三层 · IRI（理论锚点，不进打分回路）</text>
<text class="ts" x="60" y="238">认知共情(观点采择) vs 情感共情(共情关注) — 说明层</text>
<line x1="350" y1="250" x2="350" y2="272" class="arr" marker-end="url(#a)"/>

<rect class="coral" x="40" y="272" width="620" height="54" rx="10" stroke-width="1"/>
<text class="th" x="60" y="294">LLM-as-Judge 给候选回应逐维度打分</text>
<text class="ts" x="60" y="314">有文献证明可达专家级（Kumar &amp; Groh 2025），前提是先经任务校验</text>

<rect class="amber" x="40" y="356" width="300" height="54" rx="10" stroke-width="1"/>
<text class="th" x="60" y="378">极小规模人工：信度校验</text>
<text class="ts" x="60" y="398">几十条专家标注，证明 judge ≈ 专家</text>
<rect class="green" x="360" y="356" width="300" height="54" rx="10" stroke-width="1"/>
<text class="th" x="380" y="378">产出偏好对 (e⁺, e⁻) → DPO</text>
<text class="ts" x="380" y="398">校验过的 judge 自动标，人工不再是瓶颈</text>

<path d="M255 326 L190 326 L190 354" class="arr" marker-end="url(#a)"/>
<path d="M445 326 L510 326 L510 354" class="arr" marker-end="url(#a)"/>
<line x1="340" y1="383" x2="358" y2="383" class="arr" marker-end="url(#a)"/>

<text class="ts" x="350" y="438" text-anchor="middle" font-style="italic">逻辑链：权威量表定维度 → 可量化打分 → LLM判分(已验证) → 小规模人工校验 → 自动产偏好对喂DPO</text>
</svg>
