<line class="arr" x1="237" y1="128" x2="276" y2="128" marker-end="url(#arrow)"/>
<line class="arr" x1="483" y1="128" x2="522" y2="128" marker-end="url(#arrow)"/>

<rect class="box" x="78" y="242" width="604" height="72" rx="8"/>
